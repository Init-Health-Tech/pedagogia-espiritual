upstream pedagogia_api {
    server api:8000;
}

server {
    listen 80;
    server_name api.pedagogia-espiritual.init.com.mx;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.pedagogia-espiritual.init.com.mx;

    ssl_certificate /etc/letsencrypt/live/api.pedagogia-espiritual.init.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.pedagogia-espiritual.init.com.mx/privkey.pem;

    client_max_body_size 25M;

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://pedagogia_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 120s;
    }
}
